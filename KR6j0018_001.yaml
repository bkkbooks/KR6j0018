body:
  text: 淨行護持品亦云增益守護清淨行品第二至誠恭敬一心住五輪投地而作禮歸命十方正等覺三世一切具三身歸命一切大乘法歸命不退菩提衆歸命諸明真實言歸命一切諸密契以身口意清淨業殷勤無量恭敬禮歸命方便真言曰唵曩麼薩婆怛他去蘖哆去迦野嚩去枳質二合跢播那伴陀喃迦路弭右膝著地合爪掌思惟説悔先罪業我由無明所積集身口意業造衆罪貪欲恚癡覆心故於佛正法賢聖僧父母二師善知識及以無量衆生所無始生死流轉中具造極重無盡罪親對十方現在佛悉皆懺悔不復作出罪方便真言曰唵一薩􅞣婆播跛二薩叵二合吒半音三那訶曩四跋惹囉二合野五􅁥莎訶南無十方三世佛三種常身正法藏勝願菩提大心衆我今皆悉正歸依歸依方便真言曰唵薩􅞣婆勃陀步地薩怛𭊃二合捨羅𭊥蘖唓車夜弭跋惹羅二合達麼嘻唎二合入我淨此身離諸垢及與三世身口意過於大海剎塵數奉獻一切諸如來施身方便真言曰唵薩􅞣嚩怛他去蘖哆去補惹跋羅二合伐㗚哆二合曩去夜怛麼喃儞􅝩利夜哆夜弭薩􅞣婆哆他去蘖跢枳哆始柘二合地底瑟吒二合擔薩􅞣婆跢他去蘖跢枳惹二合南謎阿尾捨覩淨菩提心勝願寶我今起發濟群生生苦等集所纏繞及與無知所害身救攝歸依令解脫常當利益諸含識唵步地質多姥怛播二合那夜弭十方無量世界中諸正遍知大海衆種種善巧方便力及諸佛子為群生諸有所修福業等我今一切皆隨喜隨喜方便真言曰唵薩􅞣嚩怛他去蘖多補儜枳惹二合曩去弩慕那曩布惹謎伽三姥那羅二合娑叵二合囉拏三麼曳吽我今勸請諸如來菩提大心救世者唯願普於十方界恆以大雲降法雨勸請方便真言曰唵薩􅞣婆怛他去蘖跢悌曳二合沙拏布惹謎伽三姥那羅二合沙叵二合囉拏三麼曳吽願令凡夫所住處速捨衆苦所集身當得至於無垢地安住清淨法界體唵薩婆怛他去蘖多捺悌曳灑夜弭薩􅞣婆薩怛嚩二合呬哆􅚼㗚他野達麼馱覩悉𭍑他以反二合𫪭􅝑㗚婆二合嚩覩所修種種衆善業利益一切諸有情我今盡皆正回向除生死苦至菩提回向方便真言曰唵薩􅞣婆怛他去蘖哆去嚩枳質多二合儞􅝩利夜􅑈哆曩補惹謎伽三姥那囉二合娑叵二合囉拏三摩曳吽入佛三昧耶契為淨三業垢結三昧耶契先合定慧手並建二空輪遍觸諸支分誦持真實語入佛三昧耶明曰曩麼薩􅞣婆怛他去蘖帝頻庾二合尾捨嚩二合穆契頻也二合唵阿三謎底哩二合三謎三麼曳娑嚩二合賀法界生契般若三昧手俱作金剛拳二空在掌中風幢皆正直以契置額上繞身向下散觀身等法界無垢如虛空法界生真言曰曩麼三曼跢勃馱喃達磨馱覩􅁤娑嚩二合皤嚩句訶吽二合金剛薩埵契結金剛智印止觀手相背地水火風輪左右互相持二空各旋轉合於慧掌中是名為法輪最勝吉祥契金剛薩埵真言曰曩麼三曼跢跋惹囉二合𭊥唵跋惹囉􅇂怛麼二合句訶吽誦此真言已當住於等引諦觀我此身即是執金剛甲胄金剛契先作三補吒止觀二風輪糾持火輪上附中指上節二空自相並而在於掌中火輪想囕字囕字如明珠置之於頂上甲胄真言曰曩麼三曼跢跋惹囉二合𭊥唵跋惹囉二合迦嚩者吽次念無堪忍能制諸大障囕字赫光焰環繞周嚴身無堪忍真言曰曩麼薩􅞣婆怛他去蘖帝頻庾二合薩婆播野尾蘖帝頻也二合微濕嚩二合目契頻也二合薩􅞣婆他去訶吽二合佉吽二合洛訖叉二合摩訶去嚩麗薩􅞣婆怛他去蘖哆補儜也二合儞􅗭惹帝吽吽怛喇吒怛喇吒阿跛囉二合底訶帝娑嚩二合訶供養儀式品第三先結三昧耶次不動刀契乃奉閼伽水復獻金剛座次奉香華等去垢無動尊現前觀覽字去而一肘間熾焰朝日暉念誦真實義能除一切障先自淨心地復淨道場地悉皆除過患其相如虛空下觀訶風輪黑光焰流布次水輪嚩字其色如乳海次地觀阿字四向黃金色上四字觀門皆先誦歸命曩莫三曼跢勃馱喃下同謂覽訶嚩阿自此金剛輪普現衆法相諦觀牟尼主坐百寶蓮華環涌衆妙華億億蓮華衛各於蓮華上無量威德尊在天廣殿中殿寶柱行列幢幡華鬘等賢瓶與遏伽普雨香華雲周流珍寶聚光網垂輕蓋互映諸妙像殿聳高廣樹明徹遍法界偃蓋布瓊𠏉華葉普芬馥果實千般秀繽紛羅法筵巧色摩尼燈旁曳天衣降芳藥含滋味香膳備珍味天樂奏妙音諧韻悅意響雲臺無齊限妙呈衆供具自力佛加備及遍法界心但誦此真言充廣大供養虛空藏明妃真言曰曩麼薩􅞣婆怛他去蘖帝頻庾二合尾捨縛穆契頻也二合唵薩􅞣婆他去欠搵住沒反蘖帝薩叵囉呬𤚥誐誐曩劍婆嚩二合賀一切法不生自性本寂故想念此真言阿字置其中轉成大日尊普現塵沙衆光焰遍法界隨性令開悟大蓮華王上諦想牟尼尊於尊白豪間復現於明主諦觀明主已方作加持法大日如來心真言曰曩莫三曼多勃馱喃阿慧手金拳置於眉間上如來毫相真言曰曩麼三曼多勃馱喃阿去聲急呼痕惹急呼次諸尊真言普通種子心曰南麼三曼多勃馱喃迦契經所説迦字門一切諸法無造作真陀摩尼寶王印定慧五輪互相交金剛合掌之標式普遍一切菩薩法一切諸菩薩真言曰曩麼三曼多勃馱喃一薩􅞣婆他二微沫底三微枳羅儜上四達摩馱睹􅗭闍多五參參訶六􅁥莎訶不動尊去垢辟除使光顯為息一切障住火生三昧不動使者真言曰用慧刀印諸供物名為去垢曩麼三曼哆跋惹羅二合𭊥戰荼摩訶去嚧沙拏沙叵二合吒野吽怛囉吒半訶吽二合摩吽二合方隅結界皆用慧刀次作召請法堅固金剛縛直舒二風輪俯屈其上節是名金剛鉤能召一切衆聖依願而來不違本誓願召請聖衆真言曰曩麼三曼多勃馱喃一阿去急呼薩婆怛囉引二合鉢囉二合𫪭訶諦二怛他引蘖黨矩奢三菩提淅􅝪𭌆耶二合鉢𭌆布囉迦四􅁥莎訶次奉三昧耶具以真言契契相如前説諸三昧耶教三昧耶真言曰曩麼三曼多勃馱喃一阿三迷二怛履三迷三三摩曳四􅁥莎訶次獻遏伽水奉諸善逝者用浴無垢身閼伽真言曰曩麼三曼多勃馱喃哦哦曩三麼三麼莎嚩二合賀次奉蓮華座遍置一切處二空與地輪聚合以為臺餘輪各相遠是即蓮華印如來座真言曰曩麼三曼哆勃馱喃阿引聲急呼復次當辟除以大慧刀印聖不動真言當觀同於彼最勝金剛焰燒諸障無餘次即當轉作金剛薩埵身真言印相應遍布諸支分金剛種子心曰曩麼三曼多勃馱喃鑁念此真實義諸法離言説以具印等故即同執金剛當知彼印相水輪內五股金剛薩埵真言曰曩麼三曼多伐折囉赧一戰拏麼訶引𡀔沙赧平二吽或用三昧手作半金剛印次當周遍身被服金剛鎧身語之密印前已依法説次佉字具點以置於頂上思惟此真言諸法如虛空彼真言曰南麼三曼多勃馱喃欠先轉此字作金剛薩埵身次應一心住摧伏諸魔印智者應普轉真言共相應諸有惡心者當見遍此地金剛熾焰光當以智慧手而作金剛拳正直舒風輪加於白毫際如毗俱知形是則彼標幟此印名大印念之除衆魔毗俱胝真言曰曩莫三曼多勃馱南薩􅞣婆皤耶怛囉二合薩寧吽娑叵二合吒耶娑嚩二合訶次用難堪忍密印及真言而用結周界威猛無能覩先以三補吒風輪在於掌二空及地輪內屈猶如鉤火輪合為峯開散其水輪旋轉指十方是名結大界無能堪忍真言曰南麼三曼多勃馱喃一麗魯補𭌆微矩麗二􅁥莎訶或以不動尊成辦一切事護身處令淨結諸方界等不動尊種子心曰南麼三曼多伐折囉赧悍結彼慧刀印普皆遍灑之是諸香華等所辦供養具復一切遍置清淨法界心所謂覽字門如前所開示塗香真言曰南麼三曼多勃馱喃一微輸上馱健杜引嗢婆二合嚩􅁥莎訶散華真言曰南麼三曼多勃馱南一摩訶引昧怛𭌆也三合二毗庾二合嗢蘖帝三􅁥莎訶焚香真言曰南麼三曼多勃馱喃一達摩馱怛嚩二合拏蘖帝二􅁥莎訶燃燈真言曰南麼三曼多勃馱喃一怛他蘖多􅗗喇旨二合二薩叵二合囉儜縛婆去娑娜三伽伽猱陀􅝩里耶二合􅁥莎訶獻食真言曰南麼三曼多勃馱喃一阿囉囉迦囉囉二末鄰捺娜弭沫鄰捺泥三摩訶引沫履四莎訶諸餘供養具所應奉獻者依隨此法則淨以不動尊當合定慧掌五輪互相叉是則持衆物普通供養印復作心儀式所獻皆充滿此方及餘方大供莊嚴雲各雨諸供物供養十方界諸佛及菩薩以空藏通印如法所修事積集諸功德回向成悉地為利諸衆生若諸真言人此生求悉地先依法持誦所為既終竟又以持金剛殊勝之諷詠供養佛菩薩當得速成就金剛歌詠偈曰金剛薩埵攝受故得為無上金剛寶金剛言詞歌詠故願成金剛勝事業轉明妃偈曰以我功德所莊嚴及淨法界中出生如來神力加持故成就衆生諸義利三誦虛空藏轉明密印相如前説也持誦法則品第四如是具法供養已起利無盡衆生心稽首諸佛聖天等住相應座入三昧四種靜慮之軌儀能令內心生喜樂以真實義加持故當得真言成等引智者如先所開示現前而觀本所尊於其心月圓明中悉皆照見真言字行者應生決定意先當一緣觀本尊持彼真言祕密印自作瑜伽本尊像由住本地相應身雖少福者亦成就行者若持誦大毗盧遮那正覺真言印當依如是法大日如來種子心曰南麼三曼多勃馱喃阿所謂一切法本不生故已如前説是中身密印正覺白毫相慧手金剛拳而在於眉間如來毫相真言曰南麼三曼多勃馱喃一阿去聲急呼痕惹急呼如前轉阿字而成大日尊法力所持故與自身無異住本尊瑜伽加以五支字下體及臍上心頂與眉間於三摩呬多運想而安立以依是法住即同牟尼尊阿字加下體金輪瑜伽座鑁字加臍上素光大悲水覽字加心位赤角智火光唅字白毫際黑風自在力佉字在頂上五色名大空五字嚴身威德成就熾大慧光除衆罪業見是人赫天魔軍退等大悲空頂無邊性空不障礙故如虛空界離一切分別無分別如是一切智智妙觀平等離一切分別無分別故云無等等也因大悲風額除障智風能開發故如風能淨除塵霧煙雲如是大智風淨除無明垢穢煩惱昏沈等也塵大悲火心三昧慧炬所溫育故如火能燒一切薪如是一切智火燒無智薪滅妄業垢令無遺餘於無明暗中為大明照也言大悲水臍功德乳海所滋潤故如水能從高赴下多有饒益滋潤草木華果本性清淨如是如來智水從真言法界流趣世間潤諸持生助道之法成大果實常以洗濯菩提之心不令染污也座大悲地界金剛座下金剛寶地所執持故如地能生萬物荷負一切世間不可傾動如是一切智地從如來金剛性生即此生者畢竟無生能生菩提萬善執持一切賢聖心地不可沮壞也又於首中置百光遍照王眼安無垢字猶燈明顯照智者觀自體等同如來身心月圓明處聲鬘與相應字字無間斷猶如韻鈴鐸正等覺真言隨取而受持當知此方便速得成悉地或説異儀軌普通三密門若解旋轉者所作皆成就普通種子心真言曰南麼三曼多勃馱喃迦所謂一切諸法無造作以是理光明觀此聲實義摩尼寶王印定慧互相交一切菩薩真言曰真言如上佉字含衆色增加大空點置之於頂上當得等虛空復於其首內想念本初字純白點嚴飾最勝百明心眼界猶明燈大空無垢字住於本尊位正覺當現前又觀彼心處圓滿淨月輪炳現阿字門遍作金剛色其聲真實義諸法本不生迦字以為首或所持真實環列有圓明單字與句因隨意而出入方乃作持誦懈極然後已或以真言字運布心月中隨其深密意思念聲真實或奉香華等次第修供養真實事業品第五當如前事業而自加持作金剛薩埵身思惟佛菩薩無量諸功德於無盡衆生興大慈悲心以金剛諷誦及餘妙言辭稱歎諸如來真實功德所造善回向作如是願言如大覺世尊以所證功德回向大菩提我今亦如是以所有福聚與法界衆生共度生死海成正遍知道自利利他法住如來大住非獨為己身乃至返生死濟度諸衆生得一切種智到第一安樂當奉獻閼伽作歸命合掌置頂上思惟諸佛菩薩衆真實大功德至誠作禮言作禮偈言諸有永離一切過無量功德莊嚴身一向饒益衆生者我今悉皆歸命禮次啓白衆聖説是偈言現前諸如來救世諸菩薩不斷大乘教到殊勝位者唯願聖天衆決定證知我各當隨所安後復垂哀赴次當以三昧耶真言密印於頂上解之而生是心諸有結護加持皆令解脫以此方便故先所奉請諸尊各還所住不為無礙大誓之所留止也復用法界本性加持自體思惟淨菩提心而住金剛薩埵身是中明印前説若念誦竟以此三印持身所有真言行門終畢法則皆悉圓滿又應如前方便觀法界字以為頂相被服金剛甲胄由斯祕密莊嚴故即得如金剛自性無能沮壞之者諸有聞其音聲或見或觸皆必定於阿耨多羅三藐三菩提一切功德皆悉成就與大日如來等無有異也次復起增上心修行殊勝事業於清淨處嚴以香華先令自身作觀世音菩薩或住如來自性依前方便以真言密印加持然後以法施心讀誦大乘方廣經典或以心誦而請諸天神等令聽受之如所説偈言金剛頂經説觀世蓮華眼即同一切佛無盡莊嚴身或以世導師諸法自在者隨取一名號作本性加持觀自在種子心曰南麼三曼多勃馱喃娑急呼字門真實義諸法無染著音聲所流出當作如是觀此中身密相所謂蓮華印如前奉敷座我已分別説次説觀自在真言曰南麼三曼多勃馱喃一薩嚩怛他引蘖多嚩路吉多二羯嚕拏麼也三囉囉囉吽惹四入􅁥莎呵前以法界心字置之在頂又用此真言密印相加隨力所堪讀誦經法或造制底曼荼羅等所為已畢次從座起以和敬相應接諸人事又為身輪得支持故次行乞食或檀越請或僧中所得當離魚肉薰菜及供養本尊諸佛之餘乃至種種殘宿不淨諸酒木果等漿可以醉人者皆不應飲噉次奉摶食用獻本尊又作隨意食法若由有餘更出一分為濟飢乏乞求故當生是心我為任持身器安穩行道受是段食如膏車轄令不敗傷有所至到不應以滋味故增減其心及生悅澤嚴身之想然後觀法界心字遍淨諸食以事業金剛加持自身是中種子如鑁字真言所説復誦施十力明八遍方乃食之説此明曰南麼薩􅞣婆勃馱菩提薩埵南一唵麼蘭捺泥去帝孺忙栗寧二􅁥莎訶如是住先成就本尊瑜伽飯食訖已所餘觸食以成辦諸事真言心供養所應食者當用不空威怒增加聖不動真言當誦一遍受者歡喜常隨行人與護念之彼真言曰南麼三曼多伐折囉引二合赧一怛囉二合吒輕阿謨伽二戰荼摩訶路沙儜上三娑破二合吒野吽四怛囉二合麼野五怛囉二合麼野六吽七怛囉二合吒輕八悍漫九彼食竟休息少時復當禮拜諸佛懺悔衆罪為淨心故如是修常業乃至依前誦讀經典恆依是住於後日分亦復如是初夜後夜思惟大乘無得間絶至中夜分以事業金剛如前被金剛甲敬禮一切諸佛大菩薩等次當運心如法供養而作是念我為一切衆生志求大事因緣故應當覆護是身少時安寢非為貪著睡眠之樂先當正身威儀重纍二足右脅而臥若支體疲懈者隨意轉側無咎為令速寤常當係意在明又復不應偃臥床上次於餘日亦如是行之持真言者以不虧法則無間勤修故得真言門修菩薩行之名號也若於數時相現等持誦法中作前方便乃至具修勝業猶不成就者應自警悟倍加精進勿得生下劣相而言是法非我所堪如是展其志力自利利他常不空過以行者勤誠不休息故衆聖玄照其心則蒙威神建立得離諸障是中有二事不應捨離謂不捨諸佛菩薩及饒益無盡衆生心恆於一切智願心不傾動此因緣必定得成隨類悉地也常依內法而澡浴不應執著外淨法於觸食等懷疑悔如是皆所不應為若為任持是身故隨時盥沐除諸垢於河流等如法教與真言印共相應以法界心淨諸水隨用不動降三世真言密印護方等住於本尊自性觀復當三轉持淨土恆以一心正思惟念聖不動真言等智者默然應澡浴淨法界心不動尊種子刀印皆如前説降三世種子心曰南麼三曼多伐折囉赧南涸此中訶字門聲理如前説少分差別者所謂淨除相降伏三界尊身密之儀式當用成事業五智金剛印次説降三世真言曰南麼三曼多伐日囉赧一訶訶訶二微􅋌薩麼二合曳平三薩􅞣婆怛他引蘖多微灑也三婆嚩四怛囇二合路枳也二合微惹也五吽惹急呼二合莎訶如是澡浴灑淨已具三昧耶護支分思惟無量聖天衆三奉掬水而獻之為淨身心利他故敬禮如來勝生子遠離三毒分別等寂調諸根詣精室或依水室異方便心住如前所制儀自身三等為限量為求上中下法故行者如是作持誦所有罪流當永息必定成就推諸障一切智句集其身彼依世間成就品或復餘經之所説供養支分衆方便如其次第所修行未離有為諸相故是謂世間之悉地次説無相最殊勝具信解者所觀察若真言乘深慧人此生志求無上果隨所信解修觀照如前心供養之儀及依悉地流出品出世間品瑜伽法彼於真實緣生句內心支分離攀緣依此方便而修證當得出世間成就如所説優陀那偈言甚深無相法劣慧所不堪為應彼等故兼存有相説
